<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brainrot Stickman Forest Run</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">
    <div class="game-screen" id="gameScreen">
        <div class="forest-bg" id="forestBg"></div>
        
        <div class="player-wrapper" id="playerWrapper">
            <div class="stickman" id="stickman">
                <div class="head"></div>
                <div class="torso"></div>
                <div class="arm arm-l"></div>
                <div class="arm arm-r"></div>
                <div class="leg leg-l"></div>
                <div class="leg leg-r"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="btnAction" onclick="toggleMovement()">🏃 กดเพื่อเริ่มวิ่งแบบ Stickman</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
